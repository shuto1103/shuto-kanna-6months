<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6 MONTHS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+JP:wght@300;400;500;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f3ead7;
  --paper-deep:#e4d3b6;
  --ink:#2f2922;
  --muted:#786b5a;
  --coffee:#5a3928;
  --espresso:#211814;
  --green:#344536;
  --red:#a64c39;
  --brass:#b88a45;
  --shadow:rgba(39,27,18,.22);
  --line:rgba(47,41,34,.18);
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  color:var(--ink);
  background:
    radial-gradient(circle at 20% 12%, rgba(184,138,69,.14), transparent 28rem),
    radial-gradient(circle at 84% 30%, rgba(52,69,54,.16), transparent 24rem),
    linear-gradient(120deg, rgba(255,255,255,.45), transparent 30%),
    var(--paper);
  font-family:"Noto Serif JP", serif;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.28;
  background-image:
    linear-gradient(rgba(47,41,34,.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(47,41,34,.04) 1px, transparent 1px);
  background-size:22px 22px;
  mix-blend-mode:multiply;
  z-index:0;
}
section{position:relative;z-index:1}
img{display:block;max-width:100%;height:auto}

.hero{
  min-height:100svh;
  display:grid;
  place-items:center;
  padding:42px 18px 76px;
  overflow:hidden;
}
.hero::before,
.hero::after{
  content:"";
  position:absolute;
  border:1px solid rgba(47,41,34,.18);
  pointer-events:none;
}
.hero::before{inset:18px}
.hero::after{inset:32px;border-style:dashed;opacity:.42}
.hero-shelf{
  position:absolute;
  left:50%;
  bottom:18%;
  width:min(760px,86vw);
  height:12px;
  transform:translateX(-50%) rotate(-1deg);
  background:linear-gradient(90deg, transparent, rgba(90,57,40,.42), transparent);
  border-radius:999px;
}
.hero-object{
  position:absolute;
  opacity:.78;
  filter:drop-shadow(0 18px 18px rgba(47,41,34,.16));
  animation:slowFloat 7s ease-in-out infinite;
}
.hero-object.cup{
  right:22vw;
  bottom:22%;
  width:72px;
  height:54px;
  border:3px solid var(--coffee);
  border-top:0;
  border-radius:0 0 24px 24px;
}
.hero-object.cup::before{
  content:"";
  position:absolute;
  right:-24px;
  top:10px;
  width:24px;
  height:22px;
  border:3px solid var(--coffee);
  border-left:0;
  border-radius:0 18px 18px 0;
}
.hero-object.cup::after{
  content:"";
  position:absolute;
  left:10px;
  top:-28px;
  width:40px;
  height:28px;
  border-top:2px solid rgba(90,57,40,.5);
  border-radius:50%;
  animation:steam 2.8s ease-in-out infinite;
}
.hero-object.tag{
  left:10vw;
  top:21%;
  width:96px;
  height:56px;
  transform:rotate(-8deg);
  background:rgba(255,250,237,.58);
  border:1px solid var(--line);
}
.hero-object.tag::before{
  content:"";
  position:absolute;
  width:8px;
  height:8px;
  border:1px solid var(--line);
  border-radius:50%;
  left:12px;
  top:12px;
}
.hero-content{
  width:min(820px,100%);
  text-align:center;
  padding:70px 18px 48px;
  animation:rise .9s cubic-bezier(.2,.8,.2,1) both;
}
.kicker{
  display:inline-flex;
  align-items:center;
  gap:12px;
  font-family:"Special Elite", monospace;
  font-size:12px;
  letter-spacing:4px;
  color:var(--red);
  text-transform:uppercase;
}
.kicker::before,.kicker::after{content:"";width:34px;height:1px;background:var(--red);opacity:.5}
.hero h1{
  margin-top:28px;
  font-family:"Cormorant Garamond", serif;
  font-size:clamp(66px,17vw,168px);
  font-weight:600;
  line-height:.78;
  letter-spacing:0;
  color:var(--espresso);
}
.hero h1 span{
  display:block;
  color:transparent;
  -webkit-text-stroke:1px rgba(47,41,34,.8);
  font-style:italic;
  transform:translateY(.08em);
}
.hero-sub{
  margin:34px auto 0;
  width:min(480px,90%);
  font-family:"Special Elite", monospace;
  font-size:13px;
  letter-spacing:4px;
  color:var(--muted);
}
.scroll{
  position:absolute;
  left:50%;
  bottom:32px;
  transform:translateX(-50%);
  display:grid;
  justify-items:center;
  gap:9px;
  font-family:"Special Elite", monospace;
  font-size:10px;
  letter-spacing:3px;
  color:var(--muted);
}
.scroll i{
  display:block;
  width:1px;
  height:60px;
  background:linear-gradient(var(--muted), transparent);
  animation:scrollLine 1.9s ease-in-out infinite;
}
.line-bridge{
  display:flex;
  justify-content:center;
  position:relative;
  z-index:1;
}
.line-bridge i{
  display:block;
  width:1px;
  background:linear-gradient(var(--muted),transparent);
}
.line-bridge-final{
  background:linear-gradient(to bottom, var(--paper) 0%, #c4a882 30%, #7a5040 65%, var(--espresso) 100%);
}
.line-bridge-final i{
  background:linear-gradient(rgba(120,107,90,.4), rgba(243,234,215,.15));
}

.story-section{
  padding:92px 0;
  border-top:1px solid var(--line);
}
.section-inner{
  width:min(1040px, calc(100% - 36px));
  margin:0 auto;
}
.section-head{
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:end;
  gap:18px;
  margin-bottom:34px;
}
.section-index{
  font-family:"Special Elite", monospace;
  font-size:13px;
  letter-spacing:4px;
  color:var(--red);
  border:1px solid rgba(166,76,57,.34);
  padding:7px 10px 5px;
  transform:rotate(-2deg);
  background:rgba(255,250,237,.38);
}
.section-title{
  font-family:"Cormorant Garamond", serif;
  font-size:clamp(42px,8vw,88px);
  font-weight:600;
  line-height:.9;
  letter-spacing:0;
}
.section-rule{
  height:1px;
  background:var(--line);
  transform:translateY(-10px);
}
.section-note{
  display:none;
}
.photo-board{
  position:relative;
  display:grid;
  grid-template-columns:repeat(12, 1fr);
  align-items:start;
  gap:18px;
}
.photo-card{
  position:relative;
  grid-column:span 4;
  padding:11px 11px 34px;
  background:#fff8e8;
  border:1px solid rgba(47,41,34,.13);
  box-shadow:0 18px 34px var(--shadow);
  transform:rotate(var(--tilt, 0deg));
  opacity:0;
  translate:0 26px;
  z-index:2;
  transition:opacity .7s ease, translate .7s ease, transform .7s ease;
}
.photo-card.visible{opacity:1;translate:0 0}
.photo-card:nth-child(2n){--tilt:1.2deg}
.photo-card:nth-child(3n){--tilt:-1.4deg}
.photo-card.feature{grid-column:span 7}
.photo-card.tall{grid-column:span 5}
.photo-card.small{grid-column:span 3}
.photo-card::before{
  content:"";
  position:absolute;
  left:50%;
  top:-13px;
  width:78px;
  height:24px;
  transform:translateX(-50%) rotate(-2deg);
  background:rgba(228,211,182,.78);
  border-left:1px solid rgba(47,41,34,.1);
  border-right:1px solid rgba(47,41,34,.1);
  box-shadow:0 5px 10px rgba(47,41,34,.08);
}
.photo-card img{
  width:100%;
  height:auto;
  object-fit:contain;
  background:var(--paper-deep);
}
.photo-placeholder{
  display:grid;
  place-items:center;
  min-height:220px;
  aspect-ratio:4/3;
  background:
    linear-gradient(135deg, rgba(52,69,54,.1), transparent 42%),
    repeating-linear-gradient(45deg, rgba(47,41,34,.055) 0 1px, transparent 1px 12px),
    #efe0c3;
  border:1px dashed rgba(47,41,34,.26);
}
.photo-placeholder span{
  font-family:"Special Elite", monospace;
  font-size:12px;
  letter-spacing:4px;
  color:rgba(47,41,34,.46);
}
.photo-caption{
  position:absolute;
  left:13px;
  bottom:10px;
  font-family:"Special Elite", monospace;
  font-size:10px;
  letter-spacing:2px;
  color:var(--muted);
}
.shelf-line{
  margin-top:42px;
  height:10px;
  border-radius:999px;
  background:linear-gradient(90deg, transparent, rgba(90,57,40,.42), rgba(90,57,40,.18), transparent);
}

.last{
  min-height:100svh;
  display:grid;
  place-items:center;
  padding:80px 18px;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 38%, rgba(184,138,69,.18), transparent 28rem),
    linear-gradient(180deg, transparent, rgba(33,24,20,.08));
}
.last-title{
  position:absolute;
  top:72px;
  left:50%;
  transform:translateX(-50%);
  font-family:"Cormorant Garamond", serif;
  font-size:clamp(48px,10vw,110px);
  line-height:.9;
  color:rgba(47,41,34,.16);
}
.continuing{
  position:relative;
  width:min(920px,90vw);
  height:min(520px,70svh);
}
.route{
  position:absolute;
  inset:8% 4%;
  border:1px solid rgba(47,41,34,.18);
  border-left-color:transparent;
  border-bottom-color:transparent;
  border-radius:50%;
  animation:routeSpin 18s linear infinite;
}
.route::before{
  content:"";
  position:absolute;
  right:-7px;
  top:48%;
  width:14px;
  height:14px;
  border-radius:50%;
  background:var(--red);
  box-shadow:0 0 0 10px rgba(166,76,57,.12);
}
.future-card{
  position:absolute;
  width:clamp(92px,18vw,170px);
  aspect-ratio:3/4;
  padding:9px 9px 24px;
  background:#fff8e8;
  border:1px solid rgba(47,41,34,.12);
  box-shadow:0 18px 30px rgba(47,41,34,.18);
  animation:futureFloat 6s ease-in-out infinite;
}
.future-card::after{
  content:"";
  display:block;
  width:100%;
  height:100%;
  background:linear-gradient(135deg, rgba(52,69,54,.18), rgba(184,138,69,.18));
}
.future-card:nth-child(2){left:8%;top:24%;rotate:-9deg;animation-delay:-1s}
.future-card:nth-child(3){left:38%;top:8%;rotate:4deg;animation-delay:-2.3s}
.future-card:nth-child(4){right:10%;top:30%;rotate:10deg;animation-delay:-3.4s}
.future-card:nth-child(5){left:28%;bottom:4%;rotate:-3deg;animation-delay:-4.2s}
.bead{
  position:absolute;
  left:50%;
  top:50%;
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--brass);
  animation:beadTravel 5.5s ease-in-out infinite;
}
.bead:nth-child(6){animation-delay:.7s}
.bead:nth-child(7){animation-delay:1.4s}
.bead:nth-child(8){animation-delay:2.1s}

.close-eyes{
  min-height:100svh;
  display:grid;
  place-items:center;
  text-align:center;
  padding:70px 18px;
  background:var(--espresso);
  color:var(--paper);
  overflow:hidden;
}
.close-eyes::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 50% 48%, rgba(184,138,69,.2), transparent 24rem);
  animation:dim 4s ease-in-out infinite;
}
.close-inner{
  position:relative;
  z-index:1;
  opacity:0;
  translate:0 22px;
  transition:opacity 1s ease, translate 1s ease;
}
.close-inner.visible{opacity:1;translate:0 0}
.close-deco{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  margin-bottom:36px;
  font-family:"Special Elite", monospace;
  letter-spacing:4px;
  color:rgba(243,234,215,.54);
}
.close-deco::before,.close-deco::after{content:"";width:64px;height:1px;background:rgba(243,234,215,.24)}
.close-main{
  font-size:clamp(30px,8vw,58px);
  font-weight:400;
  letter-spacing:6px;
  line-height:1.6;
}
.close-sub{
  margin-top:22px;
  font-size:clamp(18px,4vw,28px);
  letter-spacing:4px;
  color:rgba(243,234,215,.62);
}

.reveal{
  opacity:0;
  translate:0 26px;
  transition:opacity .8s ease, translate .8s ease;
}
.reveal.visible{opacity:1;translate:0 0}

@keyframes rise{from{opacity:0;translate:0 24px}to{opacity:1;translate:0 0}}
@keyframes veilOut{0%{opacity:1}100%{opacity:0;visibility:hidden}}
#veil{
  position:fixed;
  inset:0;
  z-index:9999;
  background:var(--paper);
  pointer-events:none;
  animation:veilOut 5s cubic-bezier(.4,0,.2,1) .2s forwards;
}
@keyframes slowFloat{0%,100%{translate:0 0}50%{translate:0 -12px}}
@keyframes steam{0%,100%{opacity:.2;translate:0 8px}50%{opacity:.7;translate:0 -6px}}
@keyframes scrollLine{0%{scale:1 0;transform-origin:top}50%{scale:1 1;transform-origin:top}51%{transform-origin:bottom}100%{scale:1 0;transform-origin:bottom}}
@keyframes routeSpin{to{rotate:360deg}}
@keyframes futureFloat{0%,100%{translate:0 0}50%{translate:0 -18px}}
@keyframes beadTravel{
  0%{translate:-310px 110px;opacity:0}
  20%{opacity:1}
  78%{opacity:1}
  100%{translate:330px -120px;opacity:0}
}
@keyframes dim{0%,100%{opacity:.55}50%{opacity:1}}

.collage-board{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 0 70px;
}
.collage-board .photo-card{
  grid-column:unset !important;
  width:min(270px,74vw);
  margin-bottom:-60px;
  position:relative;
}
.collage-board .photo-card:nth-child(1){--tilt:-4deg;margin-left:-50px;z-index:1}
.collage-board .photo-card:nth-child(2){--tilt:5deg;margin-left:55px;z-index:2}
.collage-board .photo-card:nth-child(3){--tilt:-3deg;margin-left:-40px;z-index:3}
.collage-board .photo-card:nth-child(4){--tilt:6deg;margin-left:48px;z-index:4}
.collage-board .photo-card:nth-child(5){--tilt:-5deg;margin-left:-45px;z-index:5}
.collage-board .photo-card:nth-child(6){--tilt:3deg;margin-left:30px;margin-bottom:0;z-index:6}
#top .section-inner{position:relative}
.collage-board .photo-card:nth-child(odd)::after{
  content:"";position:absolute;
  left:-10px;top:30%;
  width:14px;height:46px;
  background:rgba(184,138,69,.32);
  border-radius:2px;
  transform:rotate(-4deg);
}
.collage-board .photo-card:nth-child(even)::after{
  content:"";position:absolute;
  right:-10px;top:36%;
  width:14px;height:40px;
  background:rgba(184,138,69,.28);
  border-radius:2px;
  transform:rotate(5deg);
}
.collage-deco{
  position:absolute;
  pointer-events:none;
  z-index:8;
  border-radius:2px;
}
.memory-stamp{
  display:none;
}


@media(max-width:760px){
  .hero{padding-inline:14px}
  .hero::before{inset:10px}
  .hero::after{inset:22px}
  .hero-object.tag{left:6vw;top:14%;scale:.78}
  .hero-object.cup{display:none}
  .story-section{padding:70px 0}
  .section-inner{width:min(100% - 28px, 1040px)}
  .section-head{grid-template-columns:1fr;gap:12px;margin-bottom:30px}
  .section-rule{width:100%;transform:none}
  .section-note{text-align:left;white-space:normal}
  .photo-board{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:0;
    padding:8px 0 42px;
  }
  .photo-board .photo-card,
  .photo-board .photo-card.feature,
  .photo-board .photo-card.tall,
  .photo-board .photo-card.small{
    grid-column:unset;
    width:min(278px, 74vw);
    margin-bottom:10px;
  }
  .photo-board .photo-card:nth-child(odd){
    align-self:flex-start;
    --tilt:-4.2deg;
  }
  .photo-board .photo-card:nth-child(even){
    align-self:flex-end;
    --tilt:3.8deg;
  }
  .photo-board .photo-card:nth-child(3n){
    width:min(314px, 84vw);
    align-self:center;
    --tilt:-1.2deg;
  }
  .photo-board .photo-card:nth-child(4n){
    width:min(246px, 66vw);
    align-self:flex-end;
    margin-right:5vw;
    --tilt:5.8deg;
  }
  .photo-board .photo-card:nth-child(5n){
    width:min(292px, 78vw);
    align-self:flex-start;
    margin-left:4vw;
    margin-bottom:-8px;
    --tilt:-2.6deg;
  }
  .photo-board .photo-card:nth-child(6n){
    width:min(238px, 64vw);
    align-self:flex-start;
    margin-left:10vw;
    --tilt:2.2deg;
  }
  .photo-board .photo-card:nth-child(7n){
    width:min(326px, 86vw);
    align-self:center;
    margin-bottom:-2px;
    --tilt:-5.4deg;
  }
  .photo-board .photo-card:nth-child(8n){
    width:min(266px, 71vw);
    align-self:flex-end;
    margin-right:1vw;
    --tilt:1.6deg;
  }
  .photo-board .photo-card:nth-child(9n){
    width:min(302px, 80vw);
    align-self:flex-start;
    margin-left:1vw;
    --tilt:4.4deg;
  }
  .memory-stamp{
    display:block;
    position:absolute;
    left:var(--x);
    top:var(--y);
    width:var(--size);
    aspect-ratio:1;
    object-fit:cover;
    padding:5px;
    border-radius:var(--radius);
    background:#fff8e8;
    border:1px solid rgba(47,41,34,.12);
    box-shadow:0 14px 24px rgba(47,41,34,.2);
    transform:translate(-50%, -50%) rotate(var(--r));
    opacity:.94;
    pointer-events:none;
    z-index:1;
  }
  .photo-placeholder{min-height:180px}
  .continuing{height:62svh}
}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important;transition-duration:.001ms!important}
}
</style>
</head>
<body>
<div id="veil"></div>
<section class="hero" id="hero">
  <div class="hero-object tag"></div>
  <div class="hero-object cup"></div>
  <div class="hero-shelf"></div>
  <div class="hero-content">
    <h1>6 <span>MONTHS</span></h1>
    <p class="hero-sub">Shuto & Kanna's 6-Month Lovey-Dovey Story 😏</p>
  </div>
  <div class="scroll"><span>SCROLL</span><i></i></div>
</section>

<main>
  <div class="line-bridge"><i style="height:500px"></i></div>
  <section class="story-section" id="top">
    <div class="section-inner">
      <!-- デコレーション -->
      <div class="collage-deco" style="width:62px;height:13px;top:5%;left:0%;background:rgba(184,138,69,.38);opacity:.62;transform:rotate(-8deg)"></div>
      <div class="collage-deco" style="width:48px;height:13px;top:50%;right:0%;background:rgba(184,138,69,.32);opacity:.58;transform:rotate(10deg)"></div>
      <div class="collage-deco" style="width:38px;height:13px;bottom:14%;left:3%;background:rgba(212,192,158,.5);opacity:.55;transform:rotate(-5deg)"></div>
      <div class="collage-deco" style="width:8px;height:8px;border-radius:50%;top:28%;left:3%;background:rgba(90,57,40,.14)"></div>
      <div class="collage-deco" style="width:5px;height:5px;border-radius:50%;top:62%;right:4%;background:rgba(90,57,40,.12)"></div>
      <div class="collage-deco" style="width:6px;height:6px;border-radius:50%;bottom:20%;left:6%;background:rgba(90,57,40,.1)"></div>
      <div class="collage-board">
        <figure class="photo-card feature" data-photo="assets/photos/top-01.jpg"><!-- <img src="assets/photos/top-01.jpg" alt=""> --><div class="photo-placeholder"><span>★ 01</span></div><figcaption class="photo-caption">★ / 01</figcaption></figure>
        <figure class="photo-card tall" data-photo="assets/photos/top-02.jpg"><!-- <img src="assets/photos/top-02.jpg" alt=""> --><div class="photo-placeholder"><span>★ 02</span></div><figcaption class="photo-caption">★ / 02</figcaption></figure>
        <figure class="photo-card tall" data-photo="assets/photos/top-03.jpg"><!-- <img src="assets/photos/top-03.jpg" alt=""> --><div class="photo-placeholder"><span>★ 03</span></div><figcaption class="photo-caption">★ / 03</figcaption></figure>

<script>
const observer = new IntersectionObserver((entries) => {
  entries.forEach((entry) => {
    if (entry.isIntersecting) {
      entry.target.classList.add("visible");
    }
  });
}, { threshold: 0.14, rootMargin: "0px 0px -50px 0px" });

document.querySelectorAll(".reveal, .photo-card, .close-inner").forEach((el) => observer.observe(el));

document.querySelectorAll(".photo-card[data-photo]").forEach((card) => {
  const src = card.dataset.photo;
  const img = new Image();
  img.src = src;
  img.alt = card.querySelector(".photo-caption")?.textContent || "";
  img.onload = () => {
    card.querySelector(".photo-placeholder")?.replaceWith(img);
    scheduleStampLayout();
  };
});

const stampSources = Array.from({ length: 86 }, (_, i) => `assets/stamps/stamp-${String(i + 1).padStart(2, "0")}.jpg`);
const stampSizes = [118, 148, 132, 178, 140, 166, 124, 188, 152, 136, 172, 120];
const stampTurns = [-12, 8, -5, 14, -9, 4, 11, -15, 6, -7, 13, -3];
const stampY = [0.18, 0.42, 0.66, 0.3, 0.55, 0.74];
let stampFrame = 0;

function scheduleStampLayout() {
  cancelAnimationFrame(stampFrame);
  stampFrame = requestAnimationFrame(layoutStamps);
}

function layoutStamps() {
  const boards = document.querySelectorAll(".story-section:not(#top) .photo-board");
  const mobile = window.matchMedia("(max-width: 760px)").matches;
  let stampIndex = 0;

  boards.forEach((board) => {
    board.querySelectorAll(".memory-stamp").forEach((stamp) => stamp.remove());
    if (!mobile) return;

    const boardRect = board.getBoundingClientRect();
    const cards = [...board.querySelectorAll(".photo-card")];

    cards.forEach((card, index) => {
      if (index % 2 === 1 && index % 5 !== 3) return;

      const cardRect = card.getBoundingClientRect();
      const size = stampSizes[(stampIndex + index) % stampSizes.length];
      const emptyRight = cardRect.left + cardRect.width / 2 < boardRect.left + boardRect.width / 2;
      const minX = size / 2 + 6;
      const maxX = boardRect.width - size / 2 - 6;
      const gap = 16 + ((index % 4) * 4);
      let x = emptyRight
        ? cardRect.right - boardRect.left + gap + size / 2
        : cardRect.left - boardRect.left - gap - size / 2;

      x = Math.max(minX, Math.min(maxX, x));

      const y = cardRect.top - boardRect.top + cardRect.height * stampY[(stampIndex + index) % stampY.length];
      const stamp = document.createElement("img");
      stamp.className = "memory-stamp";
      stamp.src = stampSources[stampIndex % stampSources.length];
      stamp.alt = "";
      stamp.loading = "lazy";
      stamp.decoding = "async";
      stamp.style.setProperty("--x", `${Math.round(x)}px`);
      stamp.style.setProperty("--y", `${Math.round(y)}px`);
      stamp.style.setProperty("--size", `${size}px`);
      stamp.style.setProperty("--r", `${stampTurns[(stampIndex + index) % stampTurns.length]}deg`);
      stamp.style.setProperty("--radius", index % 3 === 0 ? "999px" : "12px");
      board.appendChild(stamp);
      stampIndex++;
    });
  });
}

window.addEventListener("load", scheduleStampLayout);
window.addEventListener("resize", scheduleStampLayout);
</script>
